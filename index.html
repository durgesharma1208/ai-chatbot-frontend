<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusAI — Intelligent Chat</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Ambient background effects -->
        <div class="ambient-bg">
            <div class="orb orb-1"></div>
            <div class="orb orb-2"></div>
            <div class="orb orb-3"></div>
        </div>

        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon">
                        <svg viewBox="0 0 36 36" fill="none">
                            <circle cx="18" cy="18" r="16" stroke="url(#logoGrad)" stroke-width="2"/>
                            <path d="M12 18C12 14.6863 14.6863 12 18 12C21.3137 12 24 14.6863 24 18" stroke="url(#logoGrad)" stroke-width="2" stroke-linecap="round"/>
                            <circle cx="18" cy="22" r="2" fill="url(#logoGrad)"/>
                            <defs>
                                <linearGradient id="logoGrad" x1="4" y1="4" x2="32" y2="32">
                                    <stop stop-color="#a78bfa"/>
                                    <stop offset="1" stop-color="#06b6d4"/>
                                </linearGradient>
                            </defs>
                        </svg>
                    </div>
                    <span class="logo-text">NexusAI</span>
                </div>
                <button class="sidebar-toggle" id="sidebarClose" aria-label="Close sidebar">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
                </button>
            </div>
            <button class="new-chat-btn" id="newChatBtn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                <span>New Chat</span>
            </button>
            <div class="chat-history-list" id="chatHistoryList">
                <div class="history-section-title">Recent</div>
            </div>
            <div class="sidebar-footer">
                <div class="model-selector">
                    <div class="model-icon">⚡</div>
                    <div class="model-info">
                        <span class="model-name">LLaMA 3.1 8B</span>
                        <span class="model-detail">Instant · Groq</span>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="main-content">
            <!-- Top bar -->
            <header class="top-bar">
                <button class="menu-btn" id="menuBtn" aria-label="Open sidebar">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
                <div class="top-bar-title">
                    <span>NexusAI</span>
                    <div class="status-dot"></div>
                </div>
                <button class="clear-btn" id="clearBtn" title="Clear chat">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
                </button>
            </header>

            <!-- Chat messages -->
            <div class="chat-area" id="chatArea">
                <div class="chat-scroll" id="chatScroll">
                    <!-- Welcome screen -->
                    <div class="welcome-screen" id="welcomeScreen">
                        <div class="welcome-glow"></div>
                        <div class="welcome-icon">
                            <svg viewBox="0 0 80 80" fill="none">
                                <circle cx="40" cy="40" r="36" stroke="url(#welGrad)" stroke-width="2" opacity="0.5"/>
                                <circle cx="40" cy="40" r="24" stroke="url(#welGrad)" stroke-width="2" opacity="0.8"/>
                                <circle cx="40" cy="40" r="8" fill="url(#welGrad)"/>
                                <defs>
                                    <linearGradient id="welGrad" x1="4" y1="4" x2="76" y2="76">
                                        <stop stop-color="#a78bfa"/>
                                        <stop offset="0.5" stop-color="#818cf8"/>
                                        <stop offset="1" stop-color="#06b6d4"/>
                                    </linearGradient>
                                </defs>
                            </svg>
                        </div>
                        <h1 class="welcome-title">How can I help you today?</h1>
                        <p class="welcome-subtitle">I'm NexusAI, powered by LLaMA 3.1. Ask me anything — coding, writing, analysis, creative ideas, and more.</p>
                        <div class="suggestions">
                            <button class="suggestion-card" data-prompt="Explain quantum computing in simple terms">
                                <div class="suggestion-icon">🔬</div>
                                <span>Explain quantum computing in simple terms</span>
                            </button>
                            <button class="suggestion-card" data-prompt="Write a Python function to sort a list using merge sort">
                                <div class="suggestion-icon">💻</div>
                                <span>Write a Python merge sort function</span>
                            </button>
                            <button class="suggestion-card" data-prompt="Give me 5 creative startup ideas for 2025">
                                <div class="suggestion-icon">🚀</div>
                                <span>Creative startup ideas for 2025</span>
                            </button>
                            <button class="suggestion-card" data-prompt="Help me write a professional email to my manager requesting time off">
                                <div class="suggestion-icon">✉️</div>
                                <span>Draft a professional time-off email</span>
                            </button>
                        </div>
                    </div>

                    <!-- Messages container -->
                    <div class="messages-container" id="messagesContainer"></div>
                </div>
            </div>

            <!-- Input area -->
            <div class="input-area">
                <div class="input-wrapper">
                    <div class="input-container" id="inputContainer">
                        <textarea 
                            id="messageInput" 
                            placeholder="Message NexusAI..." 
                            rows="1"
                            autofocus
                        ></textarea>
                        <div class="input-actions">
                            <span class="char-count" id="charCount"></span>
                            <button class="send-btn" id="sendBtn" disabled aria-label="Send message">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M22 2L11 13"/>
                                    <path d="M22 2L15 22L11 13L2 9L22 2Z"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div class="input-footer">
                        <span>NexusAI can make mistakes. Verify important information.</span>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Overlay for mobile sidebar -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <script src="script.js"></script>
</body>
</html>
